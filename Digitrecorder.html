<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Digits — Phoneme Recorder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fredoka+One&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --coral: #FF6B6B;
    --ocean: #4ECDC4;
    --sun: #FFD93D;
    --lavender: #9B89F5;
    --mint: #6BCB77;
    --text: #e8e8f0;
    --dim: #666680;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 100;
  }

  /* Header */
  .header {
    width: 100%;
    max-width: 480px;
    padding: 32px 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--lavender));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Main recorder */
  .recorder-card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .recorder-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(155,137,245,0.08), transparent 70%);
    pointer-events: none;
  }

  /* Current sound display */
  .current-sound {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .sound-index {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .sound-label {
    font-family: 'Fredoka One', cursive;
    font-size: 72px;
    line-height: 1;
    color: var(--text);
    transition: all 0.2s;
  }

  .sound-label.recording {
    color: var(--coral);
    animation: pulse 0.6s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { transform: scale(1); text-shadow: 0 0 0px var(--coral); }
    to { transform: scale(1.05); text-shadow: 0 0 30px var(--coral); }
  }

  .sound-sublabel {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .sound-example {
    font-size: 11px;
    color: var(--ocean);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Waveform visualizer */
  .waveform {
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  .wave-bar {
    width: 4px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    transition: height 0.05s ease, background 0.1s;
  }

  .wave-bar.active {
    background: var(--coral);
  }

  /* Record button */
  .record-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--coral);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    -webkit-appearance: none;
  }

  .record-btn::before {
    content: '';
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: var(--coral);
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .record-btn.recording {
    border-color: var(--coral);
    animation: ringPulse 1s ease-in-out infinite;
  }

  .record-btn.recording::before {
    border-radius: 8px;
    width: 36px;
    height: 36px;
    background: var(--coral);
  }

  @keyframes ringPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
    50% { box-shadow: 0 0 0 16px rgba(255,107,107,0); }
  }

  .record-btn:active { transform: scale(0.95); }

  .record-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* Status */
  .status-bar {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    min-height: 16px;
    transition: color 0.2s;
  }

  .status-bar.recording { color: var(--coral); }
  .status-bar.done { color: var(--mint); }
  .status-bar.playing { color: var(--ocean); }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .action-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
    -webkit-appearance: none;
  }

  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .action-btn.play:not(:disabled) {
    border-color: var(--ocean);
    color: var(--ocean);
  }

  .action-btn.play:not(:disabled):active { background: rgba(78,205,196,0.1); }

  .action-btn.next:not(:disabled) {
    border-color: var(--mint);
    color: var(--mint);
  }

  .action-btn.next:not(:disabled):active { background: rgba(107,203,119,0.1); }

  .action-btn.redo:not(:disabled) {
    border-color: var(--sun);
    color: var(--sun);
  }

  .action-btn.redo:not(:disabled):active { background: rgba(255,217,61,0.1); }

  /* Sound grid */
  .grid-wrap {
    width: 100%;
    max-width: 480px;
  }

  .grid-header {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .download-all-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--lavender);
    background: transparent;
    color: var(--lavender);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.18s;
    -webkit-appearance: none;
  }

  .download-all-btn:active { background: rgba(155,137,245,0.1); }
  .download-all-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .sound-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .grid-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
  }

  .grid-item.recorded {
    border-color: var(--mint);
    background: rgba(107,203,119,0.06);
  }

  .grid-item.current {
    border-color: var(--coral);
    background: rgba(255,107,107,0.06);
  }

  .grid-item.recorded.current {
    border-color: var(--sun);
    background: rgba(255,217,61,0.06);
  }

  .grid-item:active { transform: scale(0.96); }

  .grid-letter {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--text);
    line-height: 1;
  }

  .grid-sound {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    text-align: center;
  }

  .grid-check {
    position: absolute;
    top: 4px; right: 4px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--mint);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .grid-item.recorded .grid-check { opacity: 1; }

  /* Download section */
  .download-wrap {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-top: 8px;
  }

  .download-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .download-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .download-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .download-item-name {
    font-size: 12px;
    color: var(--text);
  }

  .download-btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--ocean);
    background: transparent;
    color: var(--ocean);
    cursor: pointer;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .download-btn:active { background: rgba(78,205,196,0.1); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Digits</div>
  <div class="subtitle">Phoneme Studio</div>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Progress</span>
    <span id="progressCount">0 / 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="recorder-card">
  <div class="current-sound">
    <div class="sound-index" id="soundIndex">Sound 1 of 40</div>
    <div class="sound-label" id="soundLabel">A</div>
    <div class="sound-sublabel" id="soundSublabel">/a/ — short a</div>
    <div class="sound-example" id="soundExample">as in: cat</div>
  </div>

  <div class="waveform" id="waveform"></div>

  <button class="record-btn" id="recordBtn" onclick="toggleRecord()"></button>
  <div class="record-label" id="recordLabel">Hold to record</div>
  <div class="status-bar" id="statusBar">Ready</div>

  <div class="actions">
    <button class="action-btn redo" id="redoBtn" onclick="redoCurrent()" disabled>↺ Redo</button>
    <button class="action-btn play" id="playBtn" onclick="playCurrent()" disabled>▶ Play</button>
    <button class="action-btn next" id="nextBtn" onclick="goNext()" disabled>Next →</button>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid-header">
    <span>All Sounds</span>
    <button class="download-all-btn" id="downloadAllBtn" onclick="downloadAll()" disabled>↓ Download All</button>
  </div>
  <div class="sound-grid" id="soundGrid"></div>
</div>

<div class="download-wrap" id="downloadWrap" style="display:none">
  <div class="download-title">Recorded Files</div>
  <div class="download-list" id="downloadList"></div>
</div>

<script>
// ─── PHONEME LIST ─────────────────────────────────────────────────────────────
const PHONEMES = [
  // Short vowels
  { file:'a',    label:'A',   sub:'/a/ — short a',     example:'as in: cat' },
  { file:'eh',   label:'E',   sub:'/eh/ — short e',    example:'as in: bed' },
  { file:'ih',   label:'I',   sub:'/ih/ — short i',    example:'as in: sit' },
  { file:'aw',   label:'O',   sub:'/aw/ — short o',    example:'as in: dog' },
  { file:'uh',   label:'U',   sub:'/uh/ — short u',    example:'as in: cup' },
  // Long vowels
  { file:'ay',   label:'Ā',   sub:'/ay/ — long a',     example:'as in: rain' },
  { file:'ee',   label:'Ē',   sub:'/ee/ — long e',     example:'as in: feet' },
  { file:'eye',  label:'Ī',   sub:'/eye/ — long i',    example:'as in: kite' },
  { file:'oh',   label:'Ō',   sub:'/oh/ — long o',     example:'as in: boat' },
  { file:'oo',   label:'Ū',   sub:'/oo/ — long u',     example:'as in: moon' },
  // Consonants
  { file:'b',    label:'B',   sub:'/b/',                example:'as in: bed' },
  { file:'kuh',  label:'C/K', sub:'/kuh/',              example:'as in: cat, kite' },
  { file:'d',    label:'D',   sub:'/d/',                example:'as in: dog' },
  { file:'f',    label:'F',   sub:'/f/',                example:'as in: fish' },
  { file:'g',    label:'G',   sub:'/g/',                example:'as in: grab' },
  { file:'h',    label:'H',   sub:'/h/',                example:'as in: hop' },
  { file:'j',    label:'J',   sub:'/j/',                example:'as in: jump' },
  { file:'l',    label:'L',   sub:'/l/',                example:'as in: play' },
  { file:'m',    label:'M',   sub:'/m/',                example:'as in: moon' },
  { file:'n',    label:'N',   sub:'/n/',                example:'as in: rain' },
  { file:'p',    label:'P',   sub:'/p/',                example:'as in: play' },
  { file:'r',    label:'R',   sub:'/r/',                example:'as in: rain' },
  { file:'s',    label:'S',   sub:'/s/',                example:'as in: sit' },
  { file:'sss',  label:'S²',  sub:'/sss/ — soft s',    example:'as in: said' },
  { file:'t',    label:'T',   sub:'/t/',                example:'as in: cat' },
  { file:'v',    label:'V',   sub:'/v/',                example:'as in: have' },
  { file:'w',    label:'W',   sub:'/w/',                example:'as in: when' },
  { file:'y',    label:'Y',   sub:'/y/',                example:'as in: yes' },
  { file:'z',    label:'Z',   sub:'/z/',                example:'as in: zip' },
  // Digraphs
  { file:'sh',   label:'SH',  sub:'/sh/',               example:'as in: fish, ship' },
  { file:'ch',   label:'CH',  sub:'/ch/',               example:'as in: chip' },
  { file:'th',   label:'TH',  sub:'/th/ — soft',        example:'as in: thin' },
  { file:'thh',  label:'TH²', sub:'/thh/ — voiced',     example:'as in: the' },
  { file:'ng',   label:'NG',  sub:'/ng/',               example:'as in: ring' },
  { file:'wh',   label:'WH',  sub:'/wh/',               example:'as in: when' },
  // Blends
  { file:'fr',   label:'FR',  sub:'/fr/ blend',         example:'as in: frog' },
  { file:'st',   label:'ST',  sub:'/st/ blend',         example:'as in: stop' },
  { file:'pl',   label:'PL',  sub:'/pl/ blend',         example:'as in: play' },
  { file:'tr',   label:'TR',  sub:'/tr/ blend',         example:'as in: trip' },
  { file:'cl',   label:'CL',  sub:'/cl/ blend',         example:'as in: clap' },
  { file:'gr',   label:'GR',  sub:'/gr/ blend',         example:'as in: grab' },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentIndex = 0;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let recordings = {}; // file -> blob
let currentBlob = null;
let currentAudio = null;
let analyser = null;
let animFrame = null;
let stream = null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  buildWaveform();
  buildGrid();
  updateDisplay();
}

function buildWaveform() {
  const wf = document.getElementById('waveform');
  for (let i = 0; i < 32; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.id = `wb${i}`;
    wf.appendChild(bar);
  }
}

function buildGrid() {
  const grid = document.getElementById('soundGrid');
  PHONEMES.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'grid-item' + (i === 0 ? ' current' : '');
    item.id = `grid-${i}`;
    item.innerHTML = `
      <div class="grid-check"></div>
      <div class="grid-letter">${p.label}</div>
      <div class="grid-sound">${p.file}.mp3</div>
    `;
    item.onclick = () => jumpTo(i);
    grid.appendChild(item);
  });
}

function updateDisplay() {
  const p = PHONEMES[currentIndex];
  document.getElementById('soundIndex').textContent = `Sound ${currentIndex + 1} of ${PHONEMES.length}`;
  document.getElementById('soundLabel').textContent = p.label;
  document.getElementById('soundSublabel').textContent = p.sub;
  document.getElementById('soundExample').textContent = p.example;

  // Grid highlight
  document.querySelectorAll('.grid-item').forEach((el, i) => {
    el.classList.toggle('current', i === currentIndex);
  });

  // Scroll grid item into view
  const current = document.getElementById(`grid-${currentIndex}`);
  if (current) current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Check if already recorded
  const hasRecording = !!recordings[p.file];
  currentBlob = recordings[p.file] || null;
  document.getElementById('playBtn').disabled = !hasRecording;
  document.getElementById('nextBtn').disabled = !hasRecording;
  document.getElementById('redoBtn').disabled = !hasRecording;

  setStatus(hasRecording ? '✓ Recorded — tap Play or Next' : 'Ready', hasRecording ? 'done' : '');
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(recordings).length;
  const total = PHONEMES.length;
  document.getElementById('progressCount').textContent = `${count} / ${total}`;
  document.getElementById('progressFill').style.width = `${(count / total) * 100}%`;
  document.getElementById('downloadAllBtn').disabled = count === 0;
}

function jumpTo(i) {
  if (isRecording) return;
  currentIndex = i;
  updateDisplay();
}

// ─── RECORDING ────────────────────────────────────────────────────────────────
async function toggleRecord() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    setStatus('Mic access denied', '');
    return;
  }

  // Visualizer
  const ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 64;
  const source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);
  animateWaveform();

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
    finishRecording(blob);
    stream.getTracks().forEach(t => t.stop());
    cancelAnimationFrame(animFrame);
    resetWaveform();
  };

  mediaRecorder.start();
  isRecording = true;

  document.getElementById('recordBtn').classList.add('recording');
  document.getElementById('soundLabel').classList.add('recording');
  document.getElementById('recordLabel').textContent = 'Tap to stop';
  setStatus('● Recording...', 'recording');
  document.getElementById('playBtn').disabled = true;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('redoBtn').disabled = true;
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('soundLabel').classList.remove('recording');
  document.getElementById('recordLabel').textContent = 'Hold to record';
}

function finishRecording(blob) {
  const p = PHONEMES[currentIndex];
  recordings[p.file] = blob;
  currentBlob = blob;

  // Mark grid
  document.getElementById(`grid-${curren
